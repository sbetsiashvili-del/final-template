<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retro Game Vault</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <nav>
      <span class="nav__logo">Retro Game Vault</span>
      <div class="nav__links">
        <a href="index.html">ძიება</a>
        <a href="saved.html">შენახული</a>
      </div>
      <div class="nav__actions">
        <span id="nav-user"></span>
        <button id="logout-btn" type="button">გასვლა</button>
      </div>
    </nav>
  </header>

  <!-- auth gate: ჩანს მხოლოდ მაშინ, თუ მომხმარებელი არ არის შესული -->
  <div id="auth-gate" hidden>
    <p>ამ გვერდის სანახავად გთხოვთ <a href="login.html" class="auth-gate__link">შეხვიდეთ</a>.</p>
  </div>

  <main id="app-main">

    <!-- საძიებო / ფილტრის ფორმა -->
    <section>
      <form id="search-form" action="javascript:void(0)">

        <div class="form-group">
          <label for="search-name">სახელი</label>
          <input
            type="text"
            id="search-name"
            name="q"
            placeholder="მაგ. Warframe, RuneScape…"
            minlength="2"
          >
        </div>

        <div class="form-group">
          <label for="search-genre">ჟანრი</label>
          <select id="search-genre" name="genre">
            <option value="" selected>ყველა</option>
            <option value="mmorpg">MMORPG</option>
            <option value="shooter">Shooter</option>
            <option value="strategy">Strategy</option>
            <option value="racing">Racing</option>
            <option value="sports">Sports</option>
            <option value="fighting">Fighting</option>
            <option value="card">Card</option>
          </select>
        </div>

        <fieldset>
          <legend>პლატფორმა</legend>
          <label>
            <input type="radio" name="platform" value="all" checked>
            ყველა
          </label>
          <label>
            <input type="radio" name="platform" value="pc">
            PC
          </label>
          <label>
            <input type="radio" name="platform" value="browser">
            Browser
          </label>
        </fieldset>

        <button type="submit">ძიება</button>
      </form>
    </section>

    <!-- ჩატვირთვის და შეცდომის მდგომარეობები -->
    <p id="loading-msg" aria-live="polite" hidden>იტვირთება…</p>
    <p id="error-msg" role="alert" hidden></p>

    <!-- დინამიურად შექმნილი ბარათები აქ განთავსდება -->
    <section>
      <div id="results-grid"></div>
    </section>

  </main>

<div id="details-modal" hidden>
  <div id="modal-content">
    <button id="modal-close" type="button" aria-label="დახურვა">×</button>
    <p id="modal-loading" aria-live="polite" hidden>იტვირთება…</p>
    <p id="modal-error" role="alert" hidden></p>
    <div id="modal-body"></div>
  </div>
</div>

  <footer>
    Retro Game Vault — built with the Free-to-Play Games API
  </footer>

  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
