<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>შენახული — Retro Game Vault</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <nav>
      <span class="nav__logo">Retro Game Vault</span>
      <div class="nav__links">
        <a href="index.html">ძიება</a>
        <a href="saved.html">შენახული</a>
      </div>
      <div class="nav__actions">
        <span id="nav-user"></span>
        <button id="logout-btn" type="button">გასვლა</button>
      </div>
    </nav>
  </header>

  <!-- auth gate: ჩანს მხოლოდ მაშინ, თუ მომხმარებელი არ არის შესული -->
  <div id="auth-gate" hidden>
    <p>ამ გვერდის სანახავად გთხოვთ <a href="login.html" class="auth-gate__link">შეხვიდეთ</a>.</p>
  </div>

  <main id="app-main">

    <section>
      <h2>შენახული ელემენტები</h2>
      <p id="saved-empty" hidden>ჯერ არაფერია შენახული.</p>
      <div id="saved-grid"></div>
    </section>

  </main>

  <footer>
    Retro Game Vault — built with the Free-to-Play Games API
  </footer>

  <script src="js/api.js"></script>
  <script src="js/saved.js"></script>
</body>
</html>
